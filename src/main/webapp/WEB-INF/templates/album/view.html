<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${album.title} + ' - ' + ${album.artist != null ? album.artist.name : 'Альбом'}">Альбом</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style th:inline="css">
        :root {
            --primary-bg: #121212;
            --secondary-bg: #181818;
            --card-bg: #1e1e1e;
            --hover-bg: #282828;
            --accent: #ffdb4d;
            --accent-hover: #ffcc00;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #888888;
            --border-color: #333333;
            --success: #1db954;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
            font-size: inherit;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Навигационная панель */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            transition: background-color 0.2s;
        }

        .back-btn:hover {
            background-color: var(--hover-bg);
        }

        .album-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: color 0.2s, background-color 0.2s;
        }

        .action-btn:hover {
            color: var(--text-primary);
            background-color: var(--hover-bg);
        }

        /* Заголовок альбома */
        .album-header {
            padding-top: 70px;
            padding-bottom: 30px;
            background: linear-gradient(to bottom, #1a1a1a, #121212);
            position: relative;
            overflow: hidden;
        }

        .album-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%);
            z-index: 0;
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .album-info {
            display: flex;
            align-items: flex-end;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .album-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
        }

        .album-cover {
            width: 250px;
            height: 250px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            flex-shrink: 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .album-cover i {
            font-size: 80px;
            color: rgba(255, 255, 255, 0.8);
        }

        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 576px) {
            .album-cover {
                width: 200px;
                height: 200px;
            }
        }

        .album-details {
            flex: 1;
        }

        .album-type {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .album-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .album-title {
                font-size: 36px;
            }
        }

        .album-artist {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .album-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .play-btn {
            background-color: var(--accent);
            color: var(--primary-bg);
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: background-color 0.2s;
            border: none;
            cursor: pointer;
        }

        .play-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Основной контент */
        .main-content {
            padding-bottom: 100px;
        }

        /* Список треков */
        .tracks-section {
            margin: 40px 0;
        }

        .tracks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
        }

        .tracks-count {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .tracks-list {
            background-color: var(--secondary-bg);
            border-radius: 8px;
            overflow: hidden;
        }

        .track-item {
            display: grid;
            grid-template-columns: 50px 1fr 100px 50px;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .track-item:hover {
            background-color: var(--hover-bg);
        }

        .track-number {
            color: var(--text-secondary);
            font-size: 16px;
            text-align: center;
        }

        .track-info {
            display: flex;
            flex-direction: column;
        }

        .track-title {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .track-features {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .track-duration {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .track-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .track-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: color 0.2s, background-color 0.2s;
        }

        .track-action-btn:hover {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Информация об альбоме */
        .album-info-section {
            margin: 40px 0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 25px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 500;
        }

        /* Нижняя панель навигации */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--primary-bg);
            border-top: 1px solid var(--border-color);
            padding: 10px 0;
            z-index: 998;
        }

        .nav-items {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background-color 0.2s;
            color: var(--text-secondary);
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item:hover {
            background-color: var(--hover-bg);
        }

        .nav-icon {
            font-size: 20px;
        }

        .nav-label {
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 576px) {
            .track-item {
                grid-template-columns: 40px 1fr 80px 40px;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
<!-- Верхняя навигационная панель -->
<nav class="navbar">
    <div class="container navbar-content">
        <a href="javascript:history.back()" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>

        <div class="album-actions">
            <button class="action-btn" onclick="shareAlbum()">
                <i class="fas fa-share-alt"></i>
            </button>
            <button class="action-btn" onclick="showAlbumMenu()">
                <i class="fas fa-ellipsis-h"></i>
            </button>
        </div>
    </div>
</nav>

<!-- Заголовок альбома -->
<header class="album-header">
    <div class="container header-content">
        <div class="album-info">
            <div class="album-cover">
                <img th:if="${album.coverPath != null}" th:src="${album.coverPath}" alt="Обложка альбома">
                <i th:unless="${album.coverPath != null}" class="fas fa-compact-disc"></i>
            </div>

            <div class="album-details">
                <div class="album-type">Альбом</div>
                <h1 class="album-title" th:text="${album.title}">Название альбома</h1>
                <p class="album-artist" th:text="${album.artist != null ? album.artist.name : 'Неизвестный исполнитель'}">Исполнитель</p>

                <div class="album-meta">
                    <span th:text="${album.releaseDate != null ? #temporals.format(album.releaseDate, 'yyyy') : '2025'}">2025</span>
                    <span>•</span>
                    <span th:text="${#lists.size(tracks)} + ' треков'">0 треков</span>
                </div>

                <button class="play-btn" id="playAlbumBtn" th:if="${not #lists.isEmpty(tracks)}">
                    <i class="fas fa-play"></i>
                    Слушать альбом
                </button>
                <button class="play-btn" disabled th:unless="${not #lists.isEmpty(tracks)}">
                    <i class="fas fa-play"></i>
                    Нет треков
                </button>
            </div>
        </div>
    </div>
</header>

<!-- Основной контент -->
<main class="main-content">
    <div class="container">
        <!-- Список треков -->
        <section class="tracks-section" th:if="${not #lists.isEmpty(tracks)}">
            <div class="tracks-header">
                <h2 class="section-title">Треки</h2>
                <span class="tracks-count" th:text="${#lists.size(tracks)} + ' треков'">0 треков</span>
            </div>

            <div class="tracks-list">
                <div class="track-item" th:each="track, iterStat : ${tracks}"
                     th:data-track-id="${track.id}"
                     th:data-track-title="${track.title}"
                     th:data-track-artist="${track.artist != null ? track.artist.name : (album.artist != null ? album.artist.name : 'Исполнитель')}">
                    <div class="track-number" th:text="${iterStat.index + 1}">1</div>
                    <div class="track-info">
                        <div class="track-title" th:text="${track.title}">Название трека</div>
                        <div class="track-features" th:text="${track.artist != null ? track.artist.name : (album.artist != null ? album.artist.name : 'Исполнитель')}">Исполнитель</div>
                    </div>
                    <div class="track-duration" th:text="${track.formattedDuration}">3:45</div>
                    <div class="track-actions">
                        <button class="track-action-btn like-btn" onclick="event.stopPropagation()">
                            <i class="far fa-heart"></i>
                        </button>
                        <button class="track-action-btn add-to-playlist-btn" th:data-track-id="${track.id}" onclick="event.stopPropagation()">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="tracks-section" th:unless="${not #lists.isEmpty(tracks)}">
            <div class="empty-state">
                <i class="fas fa-music"></i>
                <h3>В этом альбоме пока нет треков</h3>
            </div>
        </section>

        <!-- Информация об альбоме -->
        <section class="album-info-section">
            <h2 class="section-title" style="margin-bottom: 20px;">Об альбоме</h2>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Дата выпуска</div>
                    <div class="info-value" th:text="${album.releaseDate != null ? #temporals.format(album.releaseDate, 'dd MMMM yyyy') : 'Не указана'}">Не указана</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Исполнитель</div>
                    <div class="info-value" th:text="${album.artist != null ? album.artist.name : 'Неизвестный'}">Неизвестный</div>
                </div>
            </div>
        </section>
    </div>
</main>

<!-- Нижняя панель навигации -->
<nav class="bottom-nav">
    <div class="nav-items">
        <a href="/" class="nav-item">
            <i class="fas fa-home nav-icon"></i>
            <span class="nav-label">Главная</span>
        </a>

        <a href="/search" class="nav-item">
            <i class="fas fa-search nav-icon"></i>
            <span class="nav-label">Поиск</span>
        </a>

        <a href="/playlists" class="nav-item" th:if="${isAuthenticated}">
            <i class="fas fa-list nav-icon"></i>
            <span class="nav-label">Библиотека</span>
        </a>
        <a href="/playlists" class="nav-item" th:unless="${isAuthenticated}" onclick="alert('Пожалуйста, войдите в систему'); return false;">
            <i class="fas fa-list nav-icon"></i>
            <span class="nav-label">Библиотека</span>
        </a>

        <a href="/account/profile" class="nav-item" th:if="${isAuthenticated}">
            <i class="fas fa-user nav-icon"></i>
            <span class="nav-label">Профиль</span>
        </a>
        <a href="/account/login" class="nav-item" th:unless="${isAuthenticated}">
            <i class="fas fa-sign-in-alt nav-icon"></i>
            <span class="nav-label">Вход</span>
        </a>
    </div>
</nav>

<!-- Глобальный плеер -->
<div th:replace="fragments/player-fragment :: player"></div>

<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', function() {
        // Данные треков для плеера
        const tracks = [];
        document.querySelectorAll('[data-track-id]').forEach(el => {
            tracks.push({
                id: el.dataset.trackId,
                title: el.dataset.trackTitle || el.querySelector('.track-title')?.textContent || 'Трек',
                artistName: el.dataset.trackArtist || el.querySelector('.track-features')?.textContent || ''
            });
        });

        // Функция воспроизведения трека
        window.playTrack = function(trackId, trackTitle, trackArtist) {
            const track = {
                id: trackId,
                title: trackTitle,
                artistName: trackArtist
            };

            if (window.MusicPlayer) {
                window.MusicPlayer.playTrack(track, tracks);
            }
        };

        // Воспроизведение всего альбома
        document.getElementById('playAlbumBtn')?.addEventListener('click', function() {
            if (tracks.length > 0 && window.MusicPlayer) {
                window.MusicPlayer.playPlaylist(tracks);
            }
        });

        // Обработка кликов по трекам
        document.querySelectorAll('[data-track-id]').forEach(el => {
            el.addEventListener('click', function(e) {
                if (e.target.closest('.track-actions, .track-action-btn')) return;

                const trackId = this.dataset.trackId;
                const trackTitle = this.dataset.trackTitle || this.querySelector('.track-title')?.textContent || 'Трек';
                const trackArtist = this.dataset.trackArtist || this.querySelector('.track-features')?.textContent || '';

                playTrack(trackId, trackTitle, trackArtist);
            });
        });

        // Обработка кнопок лайка
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const icon = this.querySelector('i');
                if (icon.classList.contains('far')) {
                    icon.classList.remove('far');
                    icon.classList.add('fas');
                    icon.style.color = 'var(--accent)';
                } else {
                    icon.classList.remove('fas');
                    icon.classList.add('far');
                    icon.style.color = '';
                }
            });
        });
    });

    function shareAlbum() {
        alert('Ссылка на альбом скопирована в буфер обмена');
    }

    function showAlbumMenu() {
        alert('Меню альбома');
    }
    /*]]>*/
</script>
</body>
</html>
