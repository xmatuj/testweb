<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${artist.name} + ' - MusicStream Admin'">Просмотр исполнителя</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/resources/css/admin.css}">
    <style>
        .detail-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .detail-row {
            display: flex;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-label {
            width: 150px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .detail-value {
            flex: 1;
        }

        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .album-card {
            background-color: var(--secondary-bg);
            border-radius: 8px;
            padding: 15px;
        }

        .album-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .track-list {
            margin-top: 20px;
        }

        .track-item {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
<div class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-crown"></i>
                <span class="logo-text">Админ</span>
            </div>
        </div>
        <nav class="sidebar-menu">
            <div class="menu-section">
                <div class="menu-title">Контент</div>
                <a href="/admin/artists" class="menu-item active">
                    <div class="menu-icon"><i class="fas fa-user"></i></div>
                    <div class="menu-text">Исполнители</div>
                </a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="container top-bar-content">
                <h1 class="page-title" th:text="${artist.name}">Исполнитель</h1>
                <div class="admin-actions">
                    <div class="user-info">
                        <div class="user-avatar" th:text="${#strings.substring(currentUser.username, 0, 1)}">A</div>
                        <span th:text="${currentUser.username}">Admin</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="container" style="padding: 30px 20px;">
            <!-- Action Buttons -->
            <div style="display: flex; gap: 15px; margin-bottom: 30px;">
                <a href="/admin/artists" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Назад
                </a>
                <a th:href="@{'/admin/artists/edit/' + ${artist.id}}" class="btn btn-primary">
                    <i class="fas fa-edit"></i> Редактировать
                </a>
                <form th:action="@{'/admin/artists/delete/' + ${artist.id}}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('Удалить исполнителя? Все связанные альбомы и треки также будут удалены.');">
                        <i class="fas fa-trash"></i> Удалить
                    </button>
                </form>
            </div>

            <!-- Artist Details -->
            <div class="detail-card">
                <h2 style="color: var(--accent); margin-bottom: 20px;">Информация об исполнителе</h2>

                <div class="detail-row">
                    <div class="detail-label">ID:</div>
                    <div class="detail-value" th:text="${artist.id}">1</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Имя:</div>
                    <div class="detail-value" th:text="${artist.name}">Queen</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Описание:</div>
                    <div class="detail-value" th:text="${artist.description}">Описание</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Альбомов:</div>
                    <!-- ИСПРАВЛЕНО: используем albumCount -->
                    <div class="detail-value" th:text="${artist.albumCount}">5</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Треков:</div>
                    <!-- ИСПРАВЛЕНО: используем trackCount -->
                    <div class="detail-value" th:text="${artist.trackCount}">20</div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
