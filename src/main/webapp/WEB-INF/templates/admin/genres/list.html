<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление жанрами - MusicStream Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #121212;
            --secondary-bg: #181818;
            --card-bg: #1e1e1e;
            --hover-bg: #282828;
            --accent: #ffdb4d;
            --accent-hover: #ffcc00;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #888888;
            --border-color: #333333;
            --success: #1db954;
            --warning: #ff9800;
            --danger: #e22134;
            --info: #2196f3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
            font-size: inherit;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Admin Layout */
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: var(--secondary-bg);
            border-right: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
        }

        .logo i {
            font-size: 24px;
        }

        .logo-text {
            margin-left: 10px;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .menu-section {
            margin-bottom: 25px;
        }

        .menu-title {
            padding: 0 20px 10px;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-secondary);
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background-color: var(--hover-bg);
            color: var(--text-primary);
        }

        .menu-item.active {
            background-color: rgba(255, 219, 77, 0.1);
            color: var(--accent);
            border-left-color: var(--accent);
        }

        .menu-icon {
            width: 20px;
            text-align: center;
        }

        .menu-text {
            flex: 1;
        }

        .main-content {
            flex: 1;
            margin-left: 250px;
            padding-bottom: 20px;
        }

        .top-bar {
            background-color: var(--secondary-bg);
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
        }

        .admin-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            background-color: var(--card-bg);
            border-radius: 20px;
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: var(--accent);
            color: var(--primary-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--primary-bg);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: var(--secondary-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--hover-bg);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background-color: #c21825;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
        }

        /* Data Table */
        .data-table {
            width: 100%;
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }

        .data-table th {
            background-color: var(--secondary-bg);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .data-table td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table tr:hover {
            background-color: var(--hover-bg);
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        /* Alerts */
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-success {
            background-color: rgba(29, 185, 84, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background-color: rgba(226, 33, 52, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 992px) {
            .sidebar {
                width: 70px;
            }

            .sidebar .logo-text,
            .sidebar .menu-text,
            .sidebar .menu-title {
                display: none;
            }

            .main-content {
                margin-left: 70px;
            }
        }

        @media (max-width: 768px) {
            .data-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
<div class="admin-layout">
    <!-- Sidebar -->
    <div th:replace="admin/fragments/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <div class="container top-bar-content">
                <h1 class="page-title">Управление жанрами</h1>

                <div class="admin-actions">
                    <div class="user-info">
                        <div class="user-avatar" th:text="${currentUser != null ? #strings.substring(currentUser.username, 0, 1) : 'A'}">A</div>
                        <span th:text="${currentUser != null ? currentUser.username : 'Admin'}">Admin</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="container" style="padding: 30px 20px;">
            <!-- Alerts -->
            <div th:if="${success}" class="alert alert-success">
                <i class="fas fa-check-circle"></i> <span th:text="${success}">Success</span>
            </div>
            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
            </div>

            <!-- Action Button -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 20px; font-weight: 600;">
                    Всего жанров: <span th:text="${#lists.size(genres)}" style="color: var(--accent);">0</span>
                </h2>
                <a href="/admin/genres/new" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Добавить жанр
                </a>
            </div>

            <!-- Table View -->
            <div th:if="${genres != null and not #lists.isEmpty(genres)}">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Треков</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="genre : ${genres}">
                        <td th:text="${genre.id}">1</td>
                        <td>
                            <strong th:text="${genre.name}">Название жанра</strong>
                        </td>
                        <td>
                            <span class="genre-track-count" th:text="${genre.trackCount}">0</span>
                        </td>
                        <td>
                            <div style="display: flex; gap: 5px;">
                                <a th:href="@{'/admin/genres/edit/' + ${genre.id}}" class="btn btn-sm btn-secondary" title="Редактировать">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{'/admin/genres/delete/' + ${genre.id}}" method="post" style="display: inline;"
                                      onsubmit="return confirm('Удалить жанр? Связанные треки могут потерять привязку к жанру.');">
                                    <button type="submit" class="btn btn-sm btn-danger" title="Удалить">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:unless="${genres != null and not #lists.isEmpty(genres)}" class="empty-state">
                <i class="fas fa-tags"></i>
                <h3>Нет жанров</h3>
                <p>Нажмите "Добавить жанр" чтобы создать первый жанр</p>
            </div>

            <div style="margin-top: 30px;">
                <a href="/admin" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Назад к дашборду
                </a>
            </div>
        </div>
    </main>
</div>
</body>
</html>
