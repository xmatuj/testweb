<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:if="${genre.id == null}">Добавление жанра - MusicStream Admin</title>
    <title th:if="${genre.id != null}">Редактирование жанра - MusicStream Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #121212;
            --secondary-bg: #181818;
            --card-bg: #1e1e1e;
            --hover-bg: #282828;
            --accent: #ffdb4d;
            --accent-hover: #ffcc00;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #888888;
            --border-color: #333333;
            --success: #1db954;
            --danger: #e22134;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
            font-size: inherit;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Admin Layout */
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: var(--secondary-bg);
            border-right: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
        }

        .logo i {
            font-size: 24px;
        }

        .logo-text {
            margin-left: 10px;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .menu-section {
            margin-bottom: 25px;
        }

        .menu-title {
            padding: 0 20px 10px;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-secondary);
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background-color: var(--hover-bg);
            color: var(--text-primary);
        }

        .menu-item.active {
            background-color: rgba(255, 219, 77, 0.1);
            color: var(--accent);
            border-left-color: var(--accent);
        }

        .menu-icon {
            width: 20px;
            text-align: center;
        }

        .menu-text {
            flex: 1;
        }

        .main-content {
            flex: 1;
            margin-left: 250px;
            padding-bottom: 20px;
        }

        .top-bar {
            background-color: var(--secondary-bg);
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            background-color: var(--card-bg);
            border-radius: 20px;
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: var(--accent);
            color: var(--primary-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        /* Forms */
        .form-container {
            max-width: 600px;
            margin: 30px 0;
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: var(--accent);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--primary-bg);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: var(--secondary-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--hover-bg);
        }

        @media (max-width: 992px) {
            .sidebar {
                width: 70px;
            }

            .sidebar .logo-text,
            .sidebar .menu-text,
            .sidebar .menu-title {
                display: none;
            }

            .main-content {
                margin-left: 70px;
            }
        }
    </style>
</head>
<body>
<div class="admin-layout">
    <!-- Sidebar -->
    <div th:replace="admin/fragments/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <div class="container top-bar-content">
                <h1 class="page-title" th:text="${genre.id == null} ? 'Добавление жанра' : 'Редактирование жанра'">
                    Добавление жанра
                </h1>
                <div class="user-info">
                    <div class="user-avatar" th:text="${currentUser != null ? #strings.substring(currentUser.username, 0, 1) : 'A'}">A</div>
                    <span th:text="${currentUser != null ? currentUser.username : 'Admin'}">Admin</span>
                </div>
            </div>
        </header>

        <div class="container" style="padding: 30px 20px;">
            <div class="form-container">
                <form th:action="@{/admin/genres/save}" method="post">
                    <input type="hidden" name="id" th:value="${genre.id}">

                    <div class="form-group">
                        <label class="form-label">Название жанра *</label>
                        <input type="text" name="name" class="form-control"
                               th:value="${genre.name}" required
                               placeholder="Например: Рок, Поп, Джаз, Электронная">
                        <small style="color: var(--text-muted); display: block; margin-top: 5px;">
                            Название жанра должно быть уникальным
                        </small>
                    </div>

                    <div class="form-actions">
                        <a href="/admin/genres" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Сохранить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
