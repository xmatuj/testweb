<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Оформление подписки ' + ${planName} + ' - MusicStream'">Оформление подписки</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #121212;
            --secondary-bg: #181818;
            --card-bg: #1e1e1e;
            --hover-bg: #282828;
            --accent: #ffdb4d;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --border-color: #333333;
            --success: #1db954;
            --danger: #e22134;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background-color: var(--primary-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
        }
        .container { max-width: 500px; width: 100%; }
        .card { background-color: var(--card-bg); border-radius: 15px; padding: 40px; }
        h1 { font-size: 28px; margin-bottom: 10px; color: var(--accent); }
        .plan-info {
            margin-bottom: 30px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .plan-info .plan-badge {
            background-color: var(--accent);
            color: var(--primary-bg);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: var(--primary-bg);
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            border: none;
            margin-top: 20px;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover { background-color: #ffcc00; }
        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--text-primary); }
        .promo-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-error {
            background-color: rgba(226, 33, 52, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
    </style>
</head>
<body>
<div class="container">
    <a href="/subscription/plans" class="back-link">
        <i class="fas fa-arrow-left"></i> Назад к тарифам
    </a>

    <div class="card">
        <h1 th:text="'Оформление ' + ${planName}">Оформление подписки</h1>
        <div class="plan-info">
            <span class="plan-badge" th:text="${planName}">Премиум</span>
            <span th:text="${planPrice} + ' ₽/' + ${planPeriod}">299 ₽/Ежемесячно</span>
        </div>

        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}">Ошибка</span>
        </div>

        <form th:action="@{/subscription/create}" method="post">
            <!-- ВАЖНО: передаем выбранный план -->
            <input type="hidden" name="plan" th:value="${selectedPlan}">

            <div class="form-group">
                <label>Номер карты</label>
                <input type="text" name="cardNumber" placeholder="0000 0000 0000 0000" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Срок действия</label>
                    <input type="text" name="cardExpiry" placeholder="MM/YY" required>
                </div>
                <div class="form-group">
                    <label>CVC</label>
                    <input type="text" name="cardCvc" placeholder="123" required>
                </div>
            </div>

            <div class="form-group">
                <label>Имя на карте</label>
                <input type="text" name="cardName" placeholder="IVAN IVANOV" required>
            </div>

            <div class="promo-section">
                <div class="form-group">
                    <label>Промокод (если есть)</label>
                    <input type="text" name="promoCode" placeholder="Введите промокод">
                </div>
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-lock"></i>
                Оплатить <span th:text="${planPrice} + ' ₽'">299 ₽</span>
            </button>
        </form>
    </div>
</div>
</body>
</html>
