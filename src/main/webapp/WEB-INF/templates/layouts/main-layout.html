<!-- src/main/webapp/WEB-INF/templates/layouts/main-layout.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'MusicStream'">MusicStream</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style th:inline="css">
        :root {
            --primary-bg: #121212;
            --secondary-bg: #181818;
            --card-bg: #1e1e1e;
            --hover-bg: #282828;
            --accent: #ffdb4d;
            --accent-hover: #ffcc00;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #888888;
            --border-color: #333333;
            --success: #1db954;
            --danger: #e22134;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
            font-size: inherit;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Навигационная панель */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .logo i {
            margin-right: 8px;
        }

        .search-bar {
            flex: 1;
            max-width: 500px;
            margin: 0 30px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .search-bar i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .notification-btn, .user-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--secondary-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .notification-btn:hover, .user-btn:hover {
            background-color: var(--hover-bg);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--primary-bg);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--primary-bg);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        /* Основной контент */
        .main-content {
            padding-top: 70px;
            padding-bottom: 100px;
            min-height: calc(100vh - 140px);
        }

        /* Нижняя панель навигации */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--primary-bg);
            border-top: 1px solid var(--border-color);
            padding: 10px 0;
            z-index: 998;
        }

        .nav-items {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background-color 0.2s;
            color: var(--text-secondary);
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item:hover {
            background-color: var(--hover-bg);
        }

        .nav-icon {
            font-size: 20px;
        }

        .nav-label {
            font-size: 12px;
        }

        /* Плеер */
        .global-player {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            background-color: var(--secondary-bg);
            border-top: 1px solid var(--border-color);
            padding: 8px 20px;
            z-index: 999;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
        }

        .player-container {
            display: flex;
            align-items: center;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .player-track {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 250px;
        }

        .player-cover {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            background: linear-gradient(135deg, var(--accent), #ffcc00);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 20px;
        }

        .player-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .player-track-name {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-track-artist {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .control-btn:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .control-btn.play-btn {
            width: 44px;
            height: 44px;
            background-color: var(--accent);
            color: #000;
        }

        .player-progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 2;
            min-width: 300px;
        }

        .time-current, .time-total {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 40px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background-color: var(--border-color);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-filled {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background-color: var(--accent);
            border-radius: 2px;
            pointer-events: none;
        }

        .player-volume {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
        }

        .player-volume i {
            color: var(--text-secondary);
            width: 20px;
        }

        #playerVolumeSlider {
            width: 80px;
            accent-color: var(--accent);
        }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 900px) {
            .player-progress-container {
                min-width: 200px;
            }
        }

        @media (max-width: 768px) {
            .search-bar {
                margin: 0 15px;
            }

            .player-container {
                flex-wrap: wrap;
            }
            .player-progress-container {
                order: 3;
                width: 100%;
                min-width: auto;
            }
            .player-volume {
                display: none;
            }
        }

        @media (max-width: 576px) {
            .nav-label {
                display: none;
            }
        }
    </style>

    <!-- Дополнительные стили страницы -->
    <th:block th:if="${additionalStyles != null}" th:utext="${additionalStyles}"></th:block>
</head>
<body>
<!-- Хедер -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- Основной контент страницы -->
<main class="main-content">
    <div th:replace="${contentTemplate} ?: ~{::empty}"></div>
</main>

<!-- Футер -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Плеер -->
<div th:replace="~{fragments/player :: player}"></div>

<!-- Скрипты -->
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
