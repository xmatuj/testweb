<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="player">
    <!-- Глобальный плеер -->
    <div class="global-player" id="globalPlayer" style="display: none;">
        <div class="player-container">
            <div class="player-track">
                <div class="player-cover" id="playerCover">
                    <i class="fas fa-music"></i>
                </div>
                <div class="player-info">
                    <div class="player-track-name" id="playerTrackName">Название трека</div>
                    <div class="player-track-artist" id="playerTrackArtist">Исполнитель</div>
                </div>
            </div>

            <div class="player-controls">
                <button class="control-btn" id="playerPrevBtn" title="Предыдущий">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="control-btn play-btn" id="playerPlayPauseBtn">
                    <i class="fas fa-play" id="playerPlayPauseIcon"></i>
                </button>
                <button class="control-btn" id="playerNextBtn" title="Следующий">
                    <i class="fas fa-step-forward"></i>
                </button>
                <button class="control-btn" id="playerShuffleBtn" title="Случайный порядок">
                    <i class="fas fa-random"></i>
                </button>
                <button class="control-btn" id="playerRepeatBtn" title="Повтор">
                    <i class="fas fa-redo"></i>
                </button>
            </div>

            <div class="player-progress-container">
                <span class="time-current" id="playerTimeCurrent">0:00</span>
                <div class="progress-bar" id="playerProgressBar">
                    <div class="progress-filled" id="playerProgressFilled"></div>
                </div>
                <span class="time-total" id="playerTimeTotal">0:00</span>
            </div>

            <div class="player-volume">
                <i class="fas fa-volume-up" id="playerVolumeIcon"></i>
                <input type="range" id="playerVolumeSlider" min="0" max="1" step="0.01" value="0.8">
            </div>
        </div>
    </div>

    <!-- Модальное окно рекламы -->
    <div class="ad-modal" id="adModal" style="display: none;">
        <div class="ad-modal-overlay"></div>
        <div class="ad-modal-content">
            <div class="ad-modal-header">
                <div class="ad-sponsor-label">Реклама</div>
                <button class="ad-close-btn" id="adCloseBtn" style="display: none;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="ad-body">
                <div class="ad-image" id="adImage">
                    <i class="fas fa-ad"></i>
                </div>
                <div class="ad-info">
                    <h3 id="adTitle">Специальное предложение!</h3>
                    <p id="adMessage">Оформите подписку и слушайте без рекламы</p>
                </div>
                <div class="ad-timer" id="adTimer">
                    <svg class="ad-timer-circle" viewBox="0 0 40 40">
                        <circle class="ad-timer-circle-bg" r="18" cx="20" cy="20"></circle>
                        <circle class="ad-timer-circle-progress" r="18" cx="20" cy="20"
                                stroke-dasharray="113.097" stroke-dashoffset="0"></circle>
                    </svg>
                    <span class="ad-timer-seconds" id="adTimerSeconds">5</span>
                </div>
            </div>
            <div class="ad-actions">
                <button class="ad-action-btn ad-subscribe-btn" id="adSubscribeBtn">
                    <i class="fas fa-crown"></i> Оформить подписку
                </button>
            </div>
            <div class="ad-skip-text" id="adSkipText" style="display: none;">
                <i class="fas fa-forward"></i> Пропустить рекламу
            </div>
        </div>
    </div>

    <style>
        .global-player {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            background-color: var(--secondary-bg, #181818);
            border-top: 1px solid var(--border-color, #333333);
            padding: 8px 20px;
            z-index: 9999;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
        }

        .player-container {
            display: flex;
            align-items: center;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .player-track {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 250px;
        }

        .player-cover {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            background: linear-gradient(135deg, var(--accent, #ffdb4d), #ffcc00);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 20px;
        }

        .player-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .player-track-name {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-track-artist {
            font-size: 12px;
            color: var(--text-secondary, #b3b3b3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary, #fff);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .control-btn:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .control-btn.play-btn {
            width: 44px;
            height: 44px;
            background-color: var(--accent, #ffdb4d);
            color: #000;
        }

        .control-btn.play-btn:hover {
            background-color: #ffcc00;
        }

        .player-progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 2;
            min-width: 300px;
        }

        .time-current, .time-total {
            font-size: 12px;
            color: var(--text-secondary, #b3b3b3);
            min-width: 40px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background-color: var(--border-color, #333);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-filled {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background-color: var(--accent, #ffdb4d);
            border-radius: 2px;
            pointer-events: none;
        }

        .player-volume {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
        }

        .player-volume i {
            color: var(--text-secondary, #b3b3b3);
            width: 20px;
        }

        #playerVolumeSlider {
            width: 80px;
            accent-color: var(--accent, #ffdb4d);
        }

        /* Стили для модального окна рекламы */
        .ad-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ad-modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
        }

        .ad-modal-content {
            position: relative;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            overflow: hidden;
            animation: adSlideIn 0.4s ease;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 219, 77, 0.3);
        }

        @keyframes adSlideIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .ad-modal-header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ad-sponsor-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .ad-close-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.2s;
        }

        .ad-close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .ad-body {
            padding: 30px 20px;
            text-align: center;
        }

        .ad-image {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--accent), #ffcc00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #000;
        }

        .ad-info h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .ad-info p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
        }

        .ad-timer {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            position: relative;
        }

        .ad-timer-circle {
            width: 70px;
            height: 70px;
            transform: rotate(-90deg);
        }

        .ad-timer-circle-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 3;
        }

        .ad-timer-circle-progress {
            fill: none;
            stroke: var(--accent);
            stroke-width: 3;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s linear;
        }

        .ad-timer-seconds {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .ad-actions {
            padding: 0 20px 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .ad-action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 14px;
        }

        .ad-subscribe-btn {
            background: linear-gradient(135deg, var(--accent), #ffcc00);
            color: #000;
        }

        .ad-subscribe-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 219, 77, 0.3);
        }

        .ad-skip-text {
            text-align: center;
            padding: 15px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: color 0.2s;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ad-skip-text:hover {
            color: var(--accent);
        }

        @media (max-width: 900px) {
            .player-progress-container {
                min-width: 200px;
            }
        }

        @media (max-width: 768px) {
            .player-container {
                flex-wrap: wrap;
            }
            .player-progress-container {
                order: 3;
                width: 100%;
                min-width: auto;
            }
            .player-volume {
                display: none;
            }
        }
    </style>

    <script th:inline="javascript">
        /*<![CDATA[*/
        (function() {
            // Проверяем, не инициализирован ли уже плеер
            if (window.MusicPlayerInitialized) {
                setTimeout(() => {
                    if (window.MusicPlayer) {
                        window.MusicPlayer.restoreUI();
                    }
                }, 100);
                return;
            }

            window.MusicPlayerInitialized = true;

            // Глобальный объект плеера
            window.MusicPlayer = {
                audio: null,
                currentTrack: null,
                playlist: [],
                playlistIndex: -1,
                isPlaying: false,
                shuffle: false,
                repeat: false,
                volume: 0.8,
                savedTime: 0,
                initialized: false,
                pendingTrack: null,      // Трек, ожидающий воспроизведения после рекламы
                pendingPlaylist: null,   // Плейлист, ожидающий воспроизведения
                adActive: false,         // Флаг показа рекламы
                adTimerInterval: null,   // Таймер рекламы
                adRemainingTime: 0,      // Оставшееся время рекламы
                shouldShowAds: false,    // Флаг, показывать ли рекламу этому пользователю

                init: function() {
                    if (this.initialized) return;

                    this.audio = new Audio();
                    this.audio.volume = this.volume;
                    this.audio.crossOrigin = 'anonymous';

                    this.loadState();
                    this.bindEvents();
                    this.restoreUI();

                    // Проверяем, нужно ли показывать рекламу
                    this.checkShouldShowAds();

                    setInterval(() => this.saveState(), 1000);
                    window.addEventListener('beforeunload', () => this.saveState());

                    this.initialized = true;
                    console.log('MusicPlayer initialized, shouldShowAds:', this.shouldShowAds);
                },

                checkShouldShowAds: async function() {
                    try {
                        const response = await fetch('/api/ad/should-show');
                        const data = await response.json();
                        this.shouldShowAds = data.shouldShowAd;
                    } catch (error) {
                        console.error('Failed to check ad status:', error);
                        this.shouldShowAds = true;
                    }
                },

                bindEvents: function() {
                    const playPauseBtn = document.getElementById('playerPlayPauseBtn');
                    const prevBtn = document.getElementById('playerPrevBtn');
                    const nextBtn = document.getElementById('playerNextBtn');
                    const shuffleBtn = document.getElementById('playerShuffleBtn');
                    const repeatBtn = document.getElementById('playerRepeatBtn');
                    const progressBar = document.getElementById('playerProgressBar');
                    const volumeSlider = document.getElementById('playerVolumeSlider');
                    const adCloseBtn = document.getElementById('adCloseBtn');
                    const adSkipText = document.getElementById('adSkipText');
                    const adSubscribeBtn = document.getElementById('adSubscribeBtn');

                    if (playPauseBtn) playPauseBtn.addEventListener('click', () => this.togglePlay());
                    if (prevBtn) prevBtn.addEventListener('click', () => this.playPrevious());
                    if (nextBtn) nextBtn.addEventListener('click', () => this.playNext());
                    if (shuffleBtn) shuffleBtn.addEventListener('click', () => this.toggleShuffle());
                    if (repeatBtn) repeatBtn.addEventListener('click', () => this.toggleRepeat());
                    if (progressBar) progressBar.addEventListener('click', (e) => this.seek(e));
                    if (volumeSlider) volumeSlider.addEventListener('input', (e) => this.setVolume(e.target.value));
                    if (adCloseBtn) adCloseBtn.addEventListener('click', () => this.closeAd(false));
                    if (adSkipText) adSkipText.addEventListener('click', () => this.closeAd(true));
                    if (adSubscribeBtn) adSubscribeBtn.addEventListener('click', () => {
                        window.location.href = '/subscription/plans';
                    });

                    this.audio.addEventListener('timeupdate', () => this.updateProgress());
                    this.audio.addEventListener('loadedmetadata', () => this.updateDuration());
                    this.audio.addEventListener('ended', () => this.onTrackEnded());
                    this.audio.addEventListener('play', () => this.setPlayingState(true));
                    this.audio.addEventListener('pause', () => this.setPlayingState(false));
                    this.audio.addEventListener('volumechange', () => this.updateVolumeIcon());
                },

                restoreUI: function() {
                    if (this.currentTrack) {
                        document.getElementById('globalPlayer').style.display = 'block';
                        document.getElementById('playerTrackName').textContent = this.currentTrack.title || 'Неизвестный трек';
                        document.getElementById('playerTrackArtist').textContent = this.currentTrack.artistName || 'Неизвестный исполнитель';

                        if (this.audio && !isNaN(this.audio.duration)) {
                            this.updateDuration();
                            this.updateProgress();
                        }
                    }

                    const playIcon = document.getElementById('playerPlayPauseIcon');
                    if (playIcon) {
                        playIcon.className = this.isPlaying ? 'fas fa-pause' : 'fas fa-play';
                    }

                    const shuffleBtn = document.getElementById('playerShuffleBtn');
                    if (shuffleBtn) {
                        shuffleBtn.style.color = this.shuffle ? 'var(--accent)' : '';
                    }

                    const repeatBtn = document.getElementById('playerRepeatBtn');
                    if (repeatBtn) {
                        repeatBtn.style.color = this.repeat ? 'var(--accent)' : '';
                    }

                    const volumeSlider = document.getElementById('playerVolumeSlider');
                    if (volumeSlider) {
                        volumeSlider.value = this.volume;
                    }

                    this.updateVolumeIcon();
                },

                showAd: function(track, playlist) {
                    if (this.adActive) return;

                    this.pendingTrack = track;
                    this.pendingPlaylist = playlist;
                    this.adActive = true;
                    this.adRemainingTime = 5;

                    // Получаем случайную рекламу
                    fetch('/api/ad/random')
                        .then(response => response.json())
                        .then(ad => {
                            this.displayAdModal(ad);
                            this.startAdTimer();
                        })
                        .catch(() => {
                            // Если ошибка, показываем дефолтную рекламу
                            this.displayDefaultAd();
                            this.startAdTimer();
                        });
                },

                displayAdModal: function(ad) {
                    const modal = document.getElementById('adModal');
                    const titleEl = document.getElementById('adTitle');
                    const messageEl = document.getElementById('adMessage');
                    const imageContainer = document.getElementById('adImage');
                    const closeBtn = document.getElementById('adCloseBtn');
                    const skipText = document.getElementById('adSkipText');
                    const timerSeconds = document.getElementById('adTimerSeconds');

                    if (titleEl) titleEl.textContent = ad.title || 'Специальное предложение!';
                    if (messageEl) messageEl.textContent = ad.message || 'Оформите подписку и слушайте без рекламы';
                    if (timerSeconds) timerSeconds.textContent = '5';

                    // Очищаем и заполняем контейнер изображения
                    if (imageContainer) {
                        imageContainer.innerHTML = '';
                        if (ad.imageUrl && !ad.imageUrl.startsWith('/images/ads/')) {
                            const img = document.createElement('img');
                            img.src = ad.imageUrl;
                            img.style.width = '100%';
                            img.style.height = '100%';
                            img.style.objectFit = 'cover';
                            img.style.borderRadius = '50%';
                            imageContainer.appendChild(img);
                        } else {
                            imageContainer.innerHTML = '<i class="fas fa-ad"></i>';
                        }
                    }

                    // Скрываем кнопку закрытия и текст пропуска до окончания таймера
                    if (closeBtn) closeBtn.style.display = 'none';
                    if (skipText) skipText.style.display = 'none';

                    // Показываем модальное окно
                    if (modal) modal.style.display = 'flex';
                },

                displayDefaultAd: function() {
                    const modal = document.getElementById('adModal');
                    const titleEl = document.getElementById('adTitle');
                    const messageEl = document.getElementById('adMessage');
                    const imageContainer = document.getElementById('adImage');
                    const timerSeconds = document.getElementById('adTimerSeconds');

                    if (titleEl) titleEl.textContent = 'Премиум подписка';
                    if (messageEl) messageEl.textContent = 'Оформите подписку всего за 299₽/мес и слушайте без рекламы!';
                    if (timerSeconds) timerSeconds.textContent = '5';
                    if (imageContainer) imageContainer.innerHTML = '<i class="fas fa-crown"></i>';

                    if (modal) modal.style.display = 'flex';
                },

                startAdTimer: function() {
                    const timerSeconds = document.getElementById('adTimerSeconds');
                    const progressCircle = document.querySelector('.ad-timer-circle-progress');
                    const totalTime = 5;
                    const circumference = 2 * Math.PI * 18;

                    if (progressCircle) {
                        progressCircle.style.strokeDasharray = circumference;
                        progressCircle.style.strokeDashoffset = circumference;
                    }

                    this.adTimerInterval = setInterval(() => {
                        this.adRemainingTime--;

                        if (timerSeconds) {
                            timerSeconds.textContent = this.adRemainingTime;
                        }

                        // Обновляем таймер на круге
                        if (progressCircle) {
                            const progress = 1 - (this.adRemainingTime / totalTime);
                            const offset = circumference * (1 - progress);
                            progressCircle.style.strokeDashoffset = offset;
                        }

                        if (this.adRemainingTime <= 0) {
                            this.closeAd(true);
                        }
                    }, 1000);
                },

                closeAd: function(allowPlayback) {
                    // Останавливаем таймер
                    if (this.adTimerInterval) {
                        clearInterval(this.adTimerInterval);
                        this.adTimerInterval = null;
                    }

                    // Скрываем модальное окно
                    const modal = document.getElementById('adModal');
                    if (modal) modal.style.display = 'none';

                    if (allowPlayback && this.pendingTrack) {
                        // Запоминаем, что реклама была показана
                        this.startPlayback(this.pendingTrack, this.pendingPlaylist);
                    }

                    this.adActive = false;
                    this.pendingTrack = null;
                    this.pendingPlaylist = null;
                },

                startPlayback: function(track, playlist) {
                    if (!track) return;

                    console.log('Starting playback for track:', track);

                    if (playlist && playlist.length > 0) {
                        this.playlist = playlist;
                        this.playlistIndex = playlist.findIndex(t => t.id == track.id);
                        if (this.playlistIndex === -1) this.playlistIndex = 0;
                    } else {
                        this.playlist = [track];
                        this.playlistIndex = 0;
                    }

                    this.currentTrack = track;

                    const newSrc = '/tracks/stream/' + track.id;
                    if (this.audio.src !== newSrc) {
                        this.audio.src = newSrc;
                        this.audio.load();
                    }

                    this.audio.play().then(() => {
                        console.log('Playback started');
                        this.isPlaying = true;
                        this.updatePlayIcon();
                    }).catch(e => {
                        console.warn('Playback failed:', e);
                    });

                    this.showPlayer();
                    this.updateTrackInfo(track);
                    this.saveState();

                    fetch('/tracks/record/' + track.id, { method: 'POST' }).catch(() => {});
                },

                updatePlayIcon: function() {
                    const icon = document.getElementById('playerPlayPauseIcon');
                    if (icon) {
                        icon.className = this.isPlaying ? 'fas fa-pause' : 'fas fa-play';
                    }
                },

                // Публичный метод для воспроизведения трека с проверкой рекламы
                playTrack: function(track, playlist) {
                    if (!track) return;

                    // Если нужно показывать рекламу и это не специальный случай
                    if (this.shouldShowAds && !this.adActive) {
                        console.log('Showing ad before playback');
                        this.showAd(track, playlist);
                    } else {
                        this.startPlayback(track, playlist);
                    }
                },

                playPlaylist: function(tracks, startIndex = 0) {
                    if (!tracks || tracks.length === 0) return;
                    this.playlist = tracks;
                    this.playTrack(tracks[startIndex], tracks);
                },

                togglePlay: function() {
                    if (!this.currentTrack) {
                        console.log('No track to play');
                        return;
                    }

                    if (this.audio.paused) {
                        this.audio.play().catch(e => console.warn('Playback failed'));
                    } else {
                        this.audio.pause();
                    }
                },

                playPrevious: function() {
                    if (this.playlist.length === 0) return;
                    let newIndex;
                    if (this.shuffle) {
                        newIndex = Math.floor(Math.random() * this.playlist.length);
                    } else {
                        newIndex = this.playlistIndex - 1;
                        if (newIndex < 0) newIndex = this.playlist.length - 1;
                    }
                    this.playTrack(this.playlist[newIndex], this.playlist);
                },

                playNext: function() {
                    if (this.playlist.length === 0) return;
                    let newIndex;
                    if (this.shuffle) {
                        newIndex = Math.floor(Math.random() * this.playlist.length);
                    } else {
                        newIndex = (this.playlistIndex + 1) % this.playlist.length;
                    }
                    this.playTrack(this.playlist[newIndex], this.playlist);
                },

                onTrackEnded: function() {
                    if (this.repeat) {
                        this.audio.currentTime = 0;
                        this.audio.play().catch(() => {});
                    } else {
                        this.playNext();
                    }
                },

                toggleShuffle: function() {
                    this.shuffle = !this.shuffle;
                    const btn = document.getElementById('playerShuffleBtn');
                    if (btn) btn.style.color = this.shuffle ? 'var(--accent)' : '';
                    this.saveState();
                },

                toggleRepeat: function() {
                    this.repeat = !this.repeat;
                    const btn = document.getElementById('playerRepeatBtn');
                    if (btn) btn.style.color = this.repeat ? 'var(--accent)' : '';
                    this.saveState();
                },

                setVolume: function(val) {
                    this.volume = parseFloat(val);
                    this.audio.volume = this.volume;
                    this.saveState();
                },

                updateVolumeIcon: function() {
                    const icon = document.getElementById('playerVolumeIcon');
                    if (icon) {
                        const vol = this.audio.volume;
                        if (vol === 0) icon.className = 'fas fa-volume-mute';
                        else if (vol < 0.5) icon.className = 'fas fa-volume-down';
                        else icon.className = 'fas fa-volume-up';
                    }
                },

                seek: function(e) {
                    if (!this.currentTrack || isNaN(this.audio.duration)) return;
                    const bar = document.getElementById('playerProgressBar');
                    const rect = bar.getBoundingClientRect();
                    const percent = (e.clientX - rect.left) / rect.width;
                    this.audio.currentTime = percent * this.audio.duration;
                },

                updateProgress: function() {
                    const filled = document.getElementById('playerProgressFilled');
                    const current = document.getElementById('playerTimeCurrent');
                    if (filled && current && !isNaN(this.audio.duration)) {
                        const percent = (this.audio.currentTime / this.audio.duration) * 100;
                        filled.style.width = percent + '%';
                        current.textContent = this.formatTime(this.audio.currentTime);
                    }
                },

                updateDuration: function() {
                    const total = document.getElementById('playerTimeTotal');
                    if (total && !isNaN(this.audio.duration)) {
                        total.textContent = this.formatTime(this.audio.duration);
                    }
                },

                formatTime: function(seconds) {
                    if (isNaN(seconds)) return '0:00';
                    const mins = Math.floor(seconds / 60);
                    const secs = Math.floor(seconds % 60);
                    return mins + ':' + (secs < 10 ? '0' : '') + secs;
                },

                setPlayingState: function(playing) {
                    this.isPlaying = playing;
                    const icon = document.getElementById('playerPlayPauseIcon');
                    if (icon) {
                        icon.className = playing ? 'fas fa-pause' : 'fas fa-play';
                    }
                    this.saveState();
                },

                showPlayer: function() {
                    const player = document.getElementById('globalPlayer');
                    if (player) player.style.display = 'block';
                },

                updateTrackInfo: function(track) {
                    const nameEl = document.getElementById('playerTrackName');
                    const artistEl = document.getElementById('playerTrackArtist');
                    if (nameEl) nameEl.textContent = track.title || 'Неизвестный трек';
                    if (artistEl) artistEl.textContent = track.artistName || 'Неизвестный исполнитель';
                },

                saveState: function() {
                    if (!this.currentTrack) return;

                    const state = {
                        currentTrack: this.currentTrack,
                        playlist: this.playlist,
                        playlistIndex: this.playlistIndex,
                        currentTime: this.audio ? this.audio.currentTime : 0,
                        volume: this.volume,
                        shuffle: this.shuffle,
                        repeat: this.repeat,
                        isPlaying: this.audio ? !this.audio.paused : false
                    };
                    localStorage.setItem('musicPlayerState', JSON.stringify(state));
                },

                loadState: function() {
                    const saved = localStorage.getItem('musicPlayerState');
                    if (saved) {
                        try {
                            const state = JSON.parse(saved);
                            this.currentTrack = state.currentTrack;
                            this.playlist = state.playlist || [];
                            this.playlistIndex = state.playlistIndex || 0;
                            this.savedTime = state.currentTime || 0;
                            this.volume = state.volume || 0.8;
                            this.shuffle = state.shuffle || false;
                            this.repeat = state.repeat || false;
                            this.isPlaying = state.isPlaying || false;

                            this.audio.volume = this.volume;

                            if (this.currentTrack) {
                                this.audio.src = '/tracks/stream/' + this.currentTrack.id;
                                this.audio.load();

                                const setTime = () => {
                                    if (!isNaN(this.audio.duration) && this.savedTime > 0) {
                                        this.audio.currentTime = this.savedTime;
                                    }
                                    this.audio.removeEventListener('loadedmetadata', setTime);
                                };
                                this.audio.addEventListener('loadedmetadata', setTime);

                                if (this.isPlaying) {
                                    this.audio.play().catch(e => {
                                        console.warn('Auto-play blocked');
                                        this.isPlaying = false;
                                    });
                                }
                            }
                        } catch(e) {
                            console.error('Failed to load player state', e);
                        }
                    }
                }
            };

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => window.MusicPlayer.init());
            } else {
                window.MusicPlayer.init();
            }

            window.playTrack = function(trackId, title, artist, playlistData) {
                const playlist = playlistData || [];
                if (!playlist.length) {
                    document.querySelectorAll('[data-track-id]').forEach(el => {
                        playlist.push({
                            id: el.dataset.trackId,
                            title: el.dataset.trackTitle || el.querySelector('.track-name, .card-title, .track-title')?.textContent || '',
                            artistName: el.dataset.trackArtist || el.querySelector('.track-artist, .card-subtitle')?.textContent || ''
                        });
                    });
                }
                window.MusicPlayer.playTrack({ id: trackId, title: title, artistName: artist }, playlist);
            };

            window.playAlbum = function(albumId) {
                fetch('/admin/albums/' + albumId + '/tracks')
                    .then(r => r.json())
                    .then(tracks => {
                        if (tracks && tracks.length) {
                            window.MusicPlayer.playPlaylist(tracks);
                        }
                    })
                    .catch(e => console.error('Error:', e));
            };
        })();
        /*]]>*/
    </script>
</div>
