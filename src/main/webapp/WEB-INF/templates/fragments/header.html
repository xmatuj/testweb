<!-- src/main/webapp/WEB-INF/templates/fragments/header.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header">
    <nav class="navbar">
        <div class="container navbar-content">
            <a href="/" class="logo">
                <i class="fas fa-music"></i>
                MusicStream
            </a>

            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Поиск треков, альбомов, исполнителей" id="searchInput">
            </div>

            <div class="user-actions" th:if="${isAuthenticated}">
                <a th:if="${isAdmin}" href="/admin" class="notification-btn" title="Админ-панель">
                    <i class="fas fa-crown"></i>
                </a>
                <button class="notification-btn">
                    <i class="far fa-bell"></i>
                </button>
                <a href="/account/profile" class="user-btn">
                    <div class="user-avatar" th:text="${currentUser != null ? #strings.substring(currentUser.username, 0, 1) : 'U'}">U</div>
                </a>
            </div>

            <div class="user-actions" th:unless="${isAuthenticated}">
                <a href="/account/login" class="btn" style="color: var(--text-primary); margin-right: 15px;">Войти</a>
                <a href="/account/register" class="btn btn-primary">Регистрация</a>
            </div>
        </div>
    </nav>
</header>
</body>
</html>
