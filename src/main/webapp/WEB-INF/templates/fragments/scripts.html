<!-- src/main/webapp/WEB-INF/templates/fragments/scripts.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="scripts">
    <script th:inline="javascript">
        /*<![CDATA[*/
        // Глобальная переменная авторизации
        window.isAuthenticated = /*[[${isAuthenticated}]]*/ false;

        document.addEventListener('DOMContentLoaded', function() {
            // Поиск
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && this.value.trim()) {
                        window.location.href = '/search?query=' + encodeURIComponent(this.value.trim());
                    }
                });
            }

            // Настройка кнопок воспроизведения на странице
            setupPlayButtons();

            // Настройка кнопок добавления в плейлист
            setupAddToPlaylistButtons();
        });

        function setupPlayButtons() {
            // Собираем все треки на странице для плейлиста
            const playlist = [];
            document.querySelectorAll('[data-track-id]').forEach(el => {
                playlist.push({
                    id: el.dataset.trackId,
                    title: el.dataset.trackTitle || el.querySelector('.track-name, .card-title, .track-title')?.textContent || 'Трек',
                    artistName: el.dataset.trackArtist || el.querySelector('.track-artist, .card-subtitle')?.textContent || 'Исполнитель'
                });
            });

            // Настройка обработчиков для треков
            document.querySelectorAll('[data-track-id]').forEach(el => {
                el.addEventListener('click', function(e) {
                    // Игнорируем клики по кнопкам действий
                    if (e.target.closest('.track-actions, .action-btn, .like-btn, button, .add-to-playlist-btn')) return;

                    const trackId = this.dataset.trackId;
                    const trackTitle = this.dataset.trackTitle || this.querySelector('.track-name, .card-title, .track-title')?.textContent || 'Трек';
                    const trackArtist = this.dataset.trackArtist || this.querySelector('.track-artist, .card-subtitle')?.textContent || 'Исполнитель';

                    if (window.MusicPlayer) {
                        window.MusicPlayer.playTrack({ id: trackId, title: trackTitle, artistName: trackArtist }, playlist);
                    }
                });
            });

            // Настройка кнопок play на карточках
            document.querySelectorAll('.play-button').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const card = this.closest('[data-track-id], .track-card, .card');
                    if (card) {
                        const trackId = card.dataset.trackId;
                        const trackTitle = card.dataset.trackTitle || card.querySelector('.track-title, .card-title')?.textContent || 'Трек';
                        const trackArtist = card.dataset.trackArtist || card.querySelector('.track-artist, .card-subtitle')?.textContent || 'Исполнитель';

                        if (trackId && window.MusicPlayer) {
                            window.MusicPlayer.playTrack({ id: trackId, title: trackTitle, artistName: trackArtist }, playlist);
                        }
                    }
                });
            });

            // Настройка кнопок лайка
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const icon = this.querySelector('i');
                    if (icon) {
                        if (icon.classList.contains('far')) {
                            icon.classList.remove('far');
                            icon.classList.add('fas');
                            icon.style.color = 'var(--accent)';
                        } else {
                            icon.classList.remove('fas');
                            icon.classList.add('far');
                            icon.style.color = '';
                        }
                    }
                });
            });
        }

        // НОВАЯ ФУНКЦИЯ: Настройка кнопок добавления в плейлист
        function setupAddToPlaylistButtons() {
            document.querySelectorAll('.add-to-playlist-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    e.preventDefault();

                    const trackId = this.dataset.trackId;

                    if (!trackId) {
                        console.error('No track ID found on button');
                        return;
                    }

                    // Проверяем авторизацию
                    if (!window.isAuthenticated) {
                        window.location.href = '/account/login';
                        return;
                    }

                    // Открываем модальное окно
                    if (typeof openAddToPlaylistModal === 'function') {
                        openAddToPlaylistModal(trackId);
                    } else {
                        console.error('openAddToPlaylistModal function not found');
                        window.location.href = '/playlists';
                    }
                });
            });
        }

        // Глобальная функция для воспроизведения трека
        window.playTrack = function(trackId, title, artist) {
            const playlist = [];
            document.querySelectorAll('[data-track-id]').forEach(el => {
                playlist.push({
                    id: el.dataset.trackId,
                    title: el.dataset.trackTitle || el.querySelector('.track-name, .card-title')?.textContent || '',
                    artistName: el.dataset.trackArtist || el.querySelector('.track-artist, .card-subtitle')?.textContent || ''
                });
            });

            if (window.MusicPlayer) {
                window.MusicPlayer.playTrack({ id: trackId, title: title, artistName: artist }, playlist);
            }
        };

        // Глобальная функция для добавления в плейлист
        window.handleAddToPlaylist = function(trackId) {
            if (!window.isAuthenticated) {
                window.location.href = '/account/login';
                return;
            }

            if (typeof openAddToPlaylistModal === 'function') {
                openAddToPlaylistModal(trackId);
            }
        };

        window.playAlbum = function(albumId) {
            fetch('/admin/albums/' + albumId + '/tracks')
                .then(r => r.json())
                .then(tracks => {
                    if (tracks && tracks.length && window.MusicPlayer) {
                        window.MusicPlayer.playPlaylist(tracks);
                    }
                })
                .catch(e => console.error('Error loading album tracks:', e));
        };
        /*]]>*/
    </script>
</div>
</body>
</html>
